<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Smart Learning Career</title>
<link rel="stylesheet" href="../static/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="background">
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
</div>
<div class="container">
<div class="glass">
<h1>Your Profile</h1>
<p>Update personal details and track your learning progress.</p>
<form id="profileForm" style="margin-top:25px;">
<div class="input-group"><i class="fa-solid fa-user"></i><input type="text" id="name" placeholder="Full Name" value="Amit Sharma" required></div>
<div class="input-group"><i class="fa-solid fa-envelope"></i><input type="email" id="email" placeholder="Email Address" value="amit@example.com" required></div>
<div class="input-group"><i class="fa-solid fa-building-columns"></i><input type="text" id="college" placeholder="College Name" value="XYZ Institute"></div>
<div class="input-group"><i class="fa-solid fa-graduation-cap"></i><input type="text" id="degree" placeholder="Degree" value="B.Tech Computer Science"></div>
<div class="input-group"><i class="fa-solid fa-book"></i><input type="text" id="skills" placeholder="Skills (comma separated)" value="Python, AI, Web Development"></div>
<button type="submit" class="login-btn">Save Profile</button>
</form>
<div style="margin-top:30px; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:18px;">
<div class="dash-card"><h3>Assessment Completed</h3><p>1 of 4</p></div>
<div class="dash-card"><h3>Courses Started</h3><p>2 active learning plans</p></div>
<div class="dash-card"><h3>Roadmap Stage</h3><p>Foundation skills</p></div>
</div>
<div style="margin-top:20px; display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">
<a href="dashboard.html" class="btn login"><i class="fa-solid fa-arrow-left"></i>Back to Dashboard</a>
<a href="roadmap.html" class="btn register"><i class="fa-solid fa-route"></i>View Roadmap</a>
</div>
</div>
</div>
<script src="../static/script.js"></script>
<script>
document.getElementById('profileForm').addEventListener('submit', function (event) {
  event.preventDefault();
  alert('Profile updated successfully!');
});
</script>
</body>
</html>
